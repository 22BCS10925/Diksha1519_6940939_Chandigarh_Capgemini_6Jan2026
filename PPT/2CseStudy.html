<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Grades Table</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        padding: 40px;
    }

    table {
        width: 80%;
        margin: auto;
        border-collapse: collapse;
        background-color: white;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    caption {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 15px;
    }

    th, td {
        padding: 12px;
        text-align: center;
        border: 1px solid #ddd;
    }

    th {
        background-color: #333;
        color: white;
    }

    /* Alternate row colors */
    tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    /* Hover effect */
    tr:hover {
        background-color: #d6f0ff;
        transition: 0.3s;
    }
</style>
</head>

<body>

<table>
    <caption>Student Grade Report</caption>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Subject</th>
        <th>Marks</th>
    </tr>

    <tr>
        <td>101</td>
        <td>Diksha</td>
        <td>DBMS</td>
        <td>89</td>
    </tr>

    <tr>
        <td>102</td>
        <td>Amit</td>
        <td>OS</td>
        <td>76</td>
    </tr>

    <tr>
        <td>103</td>
        <td>Kumari</td>
        <td>CN</td>
        <td>92</td>
    </tr>

</table>

</body>
</html>
