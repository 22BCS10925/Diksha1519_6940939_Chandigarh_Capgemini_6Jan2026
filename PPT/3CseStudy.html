<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login & Registration</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        display: flex;
        gap: 40px;
    }

    .card {
        background: white;
        padding: 30px;
        width: 280px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        transition: 0.3s;
    }

    input:focus {
        border-color: #4facfe;
        outline: none;
        box-shadow: 0 0 8px rgba(79,172,254,0.5);
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: #4facfe;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00c6ff;
    }

    @media (max-width: 768px) {
        .container {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <!-- Login Form -->
    <div class="card">
        <h2>Login</h2>
        <form>
            <label>Username</label>
            <input type="text" placeholder="Enter username">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Registration Form -->
    <div class="card">
        <h2>Register</h2>
        <form>
            <label>Username</label>
            <input type="text" placeholder="Enter username">

            <label>Email</label>
            <input type="email" placeholder="Enter email">

            <label>Password</label>
            <input type="password" placeholder="Create password">

            <button type="submit">Register</button>
        </form>
    </div>

</div>

</body>
</html>
