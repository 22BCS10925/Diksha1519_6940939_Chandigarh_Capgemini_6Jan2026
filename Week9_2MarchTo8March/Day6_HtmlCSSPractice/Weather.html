<!DOCTYPE html>
<html>
<head>
<title>Weather Dashboard</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(#74ebd5,#ACB6E5);
transition:1s;
}

.card{
background:white;
padding:30px;
width:350px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
padding:10px;
width:70%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
background:#2196F3;
color:white;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
}

.icon{
font-size:40px;
}

</style>
</head>

<body>

<div class="card">

<h2>🌤 Weather Today</h2>

<input id="city" placeholder="Enter city">

<button onclick="checkWeather()">Check</button>

<div id="result"></div>

</div>

<script>

function checkWeather(){

let city=document.getElementById("city").value;

let data={
Paris:{temp:"22°C",condition:"Sunny",icon:"☀️"},
London:{temp:"16°C",condition:"Rain",icon:"🌧"},
Delhi:{temp:"35°C",condition:"Sunny",icon:"☀️"},
Tokyo:{temp:"20°C",condition:"Cloudy",icon:"☁️"},
Sydney:{temp:"18°C",condition:"Rain",icon:"🌧"}
};

let weather=data[city];

if(weather){

document.getElementById("result").innerHTML=
"<div class='icon'>"+weather.icon+"</div>"+
"City: "+city+"<br>"+
"Temperature: "+weather.temp+"<br>"+
"Condition: "+weather.condition;

if(weather.condition==="Sunny")
document.body.style.background="linear-gradient(#fddb92,#d1fdff)";

else if(weather.condition==="Rain")
document.body.style.background="linear-gradient(#4e54c8,#8f94fb)";

else
document.body.style.background="linear-gradient(#bdc3c7,#2c3e50)";

}

else{
document.getElementById("result").innerHTML="City not in mock data.";
}

}

</script>

</body>
</html>
