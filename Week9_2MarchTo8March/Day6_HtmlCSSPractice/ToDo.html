<!DOCTYPE html>
<html>
<head>
<title>Interactive To Do List</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#89f7fe,#66a6ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:380px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
background:#4CAF50;
color:white;
border-radius:8px;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
transition:0.3s;
}

li:hover{
background:#f7f7f7;
}

.done{
text-decoration:line-through;
color:gray;
}

.delete{
background:red;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
color:white;
}

.counter{
margin-top:10px;
font-size:14px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<h2>📝 My Tasks</h2>

<input id="taskInput" placeholder="Add new task">
<button onclick="addTask()">Add</button>
<button onclick="clearTasks()">Clear</button>

<ul id="taskList"></ul>

<p class="counter" id="counter">0 tasks</p>

</div>

<script>

let input=document.getElementById("taskInput");

input.addEventListener("keypress",function(e){
if(e.key==="Enter") addTask();
});

function addTask(){

let task=input.value.trim();

if(task==="") return;

let li=document.createElement("li");

let span=document.createElement("span");

span.innerText=task;

span.onclick=function(){
span.classList.toggle("done");
}

let del=document.createElement("span");

del.innerText="X";

del.className="delete";

del.onclick=function(){
li.remove();
updateCounter();
}

li.appendChild(span);
li.appendChild(del);

document.getElementById("taskList").appendChild(li);

input.value="";

updateCounter();

}

function clearTasks(){
document.getElementById("taskList").innerHTML="";
updateCounter();
}

function updateCounter(){
let count=document.querySelectorAll("#taskList li").length;
document.getElementById("counter").innerText=count+" tasks";
}

</script>

</body>
</html>
